plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"  // 🔔 Firebase
}

android {
    namespace = "com.example.project"
    compileSdk = 35  // ✅ Changé
    ndkVersion = "25.1.8937393"  // ✅ Changé

    compileOptions {
        coreLibraryDesugaringEnabled true  // 🔔 Ajouté
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "com.example.project"
        minSdkVersion = 21  // 🔔 Requis pour flutter_local_notifications (ou activer desugaring)
        targetSdk = 35
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        multiDexEnabled true  // 🔔 Ajouté pour Firebase
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.3'  // 🔔 Ajouté
}
